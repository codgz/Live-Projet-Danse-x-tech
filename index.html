<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catalog of Movement</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Syne:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --fg: #000000;
    --fg2: #3a3a3a;
    --fg3: #888888;
    --border: rgba(0,0,0,0.14);
    --cell-bg: #d4d4d4;
    --serif: 'Playfair Display', Georgia, serif;
    --sans: 'Syne', sans-serif;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 300;
    min-height: 100vh;
  }

 .page {
  min-height: 100vh;
}

  /* ── HOME ── */
  #home {
    min-height: 100vh;
    display: grid;
    grid-template-rows: 1fr auto;
    padding: 3rem 3rem 2.5rem;
  }

  .home-body {
    display: flex;
    flex-direction: column;
    justify-content: center;
    max-width: 800px;
  }

  .home-eyebrow {
    font-family: var(--sans);
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--fg3);
    margin-bottom: 1.5rem;
    font-weight: 400;
  }

  .home-title {
    font-family: var(--serif);
    font-size: clamp(52px, 9vw, 110px);
    line-height: 0.95;
    color: var(--fg);
    letter-spacing: -0.01em;
    margin-bottom: 0.15em;
  }

  .home-title em {
    font-style: italic;
    color: var(--fg2);
  }

  .home-divider {
    width: 48px;
    height: 1px;
    background: var(--border);
    margin: 2rem 0;
  }

  .home-meta-row {
    display: flex;
    flex-wrap: wrap;
    gap: 2rem;
    margin-bottom: 3rem;
  }

  .home-meta-item {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .home-meta-label {
    font-family: var(--sans);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    font-weight: 500;
    color: var(--fg3);
  }

  .home-meta-value {
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 300;
    color: var(--fg);
  }

  .enter-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--fg);
    color: var(--bg);
    border: none;
    padding: 13px 28px;
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.2s;
    border-radius: 0;
  }
  .enter-btn:hover { opacity: 0.7; }
  .enter-btn .arrow { transition: transform 0.2s; }
  .enter-btn:hover .arrow { transform: translateX(4px); }

  .home-footer {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding-top: 2rem;
    border-top: 1px solid var(--border);
  }

  .home-footer-note {
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 300;
    color: var(--fg3);
    line-height: 1.7;
  }

  .home-count-large {
    font-family: var(--serif);
    font-size: clamp(40px, 6vw, 72px);
    color: var(--fg3);
    line-height: 1;
  }

  /* ── CATALOG ── */
  #catalog {
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    padding: 0 2rem 2rem;
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.5rem 0 1.25rem;
    border-bottom: 1px solid var(--border);
    margin-bottom: 1.5rem;
    gap: 1rem;
  }

  .topbar-left {
    display: flex;
    align-items: baseline;
    gap: 1.5rem;
  }

  .topbar-title {
    font-family: var(--serif);
    font-size: 18px;
    font-weight: 400;
    color: var(--fg);
    letter-spacing: -0.01em;
  }

  .back-btn {
    background: none;
    border: none;
    font-family: var(--sans);
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--fg3);
    cursor: pointer;
    text-transform: uppercase;
    font-weight: 400;
    transition: color 0.15s;
  }
  .back-btn:hover { color: var(--fg); }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .page-info {
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 400;
    color: var(--fg3);
    letter-spacing: 0.06em;
    white-space: nowrap;
  }

  .nav-btn {
    background: none;
    border: 1px solid var(--border);
    font-family: var(--sans);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 400;
    color: var(--fg2);
    padding: 6px 16px;
    cursor: pointer;
    border-radius: 0;
    transition: all 0.15s;
  }
  .nav-btn:hover:not(:disabled) {
    background: var(--fg);
    color: var(--bg);
    border-color: var(--fg);
  }
  .nav-btn:disabled { opacity: 0.25; cursor: default; }

  /* ── GRID ── */
  #grid-container {
  display: grid;
  grid-template-columns: repeat(4, 1fr); /* 4 colonnes */
  grid-template-rows: repeat(3, 1fr);    /* 3 lignes */
  gap: 5px;
  align-content: start;
}

  /* Every cell — perfectly square, no exceptions */
  .cell {
    background: var(--cell-bg);
    overflow: hidden;
    position: relative;
    cursor: pointer;
    transition: opacity 0.2s;
    aspect-ratio: 1 / 1;
  }
  .cell:hover { opacity: 0.82; }

  .cell img,
  .cell video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .placeholder-x {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .placeholder-x svg {
    width: 24px;
    height: 24px;
    opacity: 0.2;
  }

  .vid-tag {
    position: absolute;
    bottom: 7px;
    right: 7px;
    background: rgba(0,0,0,0.55);
    color: #fff;
    font-family: var(--sans);
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 400;
    padding: 3px 7px;
    pointer-events: none;
  }

  /* Text cell — same square as media cells */
  .text-cell {
    background: #f0f0f0;
    padding: 1.25rem;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    aspect-ratio: 1 / 1;
  }

  .text-series {
    font-family: var(--sans);
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-weight: 500;
    color: var(--fg3);
    margin-bottom: 10px;
  }

  .text-body {
    font-family: var(--serif);
    font-style: italic;
    font-size: 13px;
    color: var(--fg2);
    line-height: 1.6;
    font-weight: 400;
  }

  /* Dots */
  .bottom-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
    margin-top: 1.5rem;
  }

  .dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--border);
    cursor: pointer;
    transition: background 0.2s, transform 0.2s;
  }
  .dot:hover { background: var(--fg3); }
  .dot.active {
    background: var(--fg);
    transform: scale(1.3);
  }

@media (max-width: 600px) {
  #grid-container {
    grid-template-columns: repeat(2, 1fr);
    grid-template-rows: auto;
  }
}
</style>
</head>
<body>

<!-- HOME -->
<div id="home" class="page active">
  <div class="home-body">
    <p class="home-eyebrow">Live Project &nbsp;·&nbsp; Danse × Tech</p>
    <h1 class="home-title">Catalog of<br><em>Movement</em></h1>
    <div class="home-divider"></div>
    <div class="home-meta-row">
      <div class="home-meta-item">
        <span class="home-meta-label">Projet</span>
        <span class="home-meta-value">Live Project, Danse × Tech</span>
      </div>
      <div class="home-meta-item">
        <span class="home-meta-label">Date</span>
        <span class="home-meta-value">April 2026</span>
      </div>
      <div class="home-meta-item">
        <span class="home-meta-label">Médias</span>
        <span class="home-meta-value">Images &amp; Vidéos</span>
      </div>
    </div>
    <button class="enter-btn" onclick="openCatalog()">
      Enter catalog <span class="arrow">→</span>
    </button>
  </div>
  <div class="home-footer">
    <p class="home-footer-note">
      50 works across 4 pages<br>
      Images &amp; video — square format
    </p>
    <p class="home-count-large">50</p>
  </div>
</div>

<!-- CATALOG -->
<div id="catalog" class="page">
  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-title">Catalog of Movement</span>
      <button class="back-btn" onclick="goHome()">← Home</button>
    </div>
    <div class="topbar-right">
      <span class="page-info" id="page-label">01 / 04</span>
      <button class="nav-btn" id="prev-btn" onclick="changePage(-1)" disabled>Prev</button>
      <button class="nav-btn" id="next-btn" onclick="changePage(1)">Next</button>
    </div>
  </div>

  <div id="grid-container"></div>
  <div class="bottom-bar" id="dots-row"></div>
</div>

<script>
const PAGES = [
  {
    cells: [
      { type:'img', idx:1, src:'img/03.30.2026-01.png' },
      { type:'img', idx:2, src:'img/03.30.2026-02.png' },
      { type:'text',
        label:'Series I — Initiation',
        body:'Testing the code’s potential through movement before engaging with the dancers.' },
      { type:'img', idx:3, src:'img/03.30.2026-03.png' },
      { type:'video', idx:4, src:'img/03.30.2026-04.mov' },
      { type:'img', idx:5, src:'img/03.30.2026-05.png' },
      { type:'img', idx:6, src:'img/03.30.2026-06.png' },
      { type:'video', idx:7, src:'img/03.31.2026-01.mov' },
      { type:'video', idx:8, src:'img/04.07.2026-01.mov' },
      { type:'video', idx:9 },
      { type:'img', idx:10 },
      { type:'img', idx:11 },
    ]
  },
  {
    cells: [
      { type:'text',
        label:'Series II — Color',
        body:'Modulating color and tone to influence the resulting intention.' },
      { type:'img', idx:12, src:'img/04.09.2026-01.png' },
      { type:'img', idx:13, src:'img/04.09.2026-02.png' },
      { type:'img', idx:14, src:'img/04.09.2026-03.png' },
      { type:'img', idx:15, src:'img/04.09.2026-04.png'},
      { type:'img', idx:16, src:'img/04.09.2026-05.png' },
      { type:'img', idx:17 },
      { type:'img', idx:18 },
      { type:'video', idx:19 },
      { type:'img', idx:20 },
      { type:'img', idx:21 },
      { type:'img', idx:22 },
    ]
  },
  {
    cells: [
      { type:'img', idx:23 },
      { type:'img', idx:24 },
      { type:'img', idx:25 },
      { type:'img', idx:26 },
      { type:'text',
        label:'Series III — Contact',
        body:'Two bodies, one axis. The negotiation of space as a form of language.' },
      { type:'img', idx:27 },
      { type:'img', idx:28 },
      { type:'img', idx:29 },
      { type:'video', idx:30 },
      { type:'img', idx:31 },
      { type:'img', idx:32 },
      { type:'img', idx:33 },
    ]
  },
  {
    cells: [
      { type:'img', idx:34 },
      { type:'img', idx:35 },
      { type:'img', idx:36 },
      { type:'img', idx:37 },
      { type:'text',
        label:'Series IV — Trace',
        body:'What the body leaves behind: shadows, breath, the echo of weight on a surface.' },
      { type:'video', idx:38 },
      { type:'img', idx:39 },
      { type:'img', idx:40 },
      { type:'img', idx:41 },
      { type:'img', idx:42 },
      { type:'img', idx:43 },
      { type:'img', idx:44 },
    ]
  }
];

let current = 0;

function xSVG() {
  return `<svg viewBox="0 0 24 24" fill="none">
    <rect x="0.5" y="0.5" width="23" height="23" stroke="currentColor"/>
    <line x1="0" y1="0" x2="24" y2="24" stroke="currentColor"/>
    <line x1="24" y1="0" x2="0" y2="24" stroke="currentColor"/>
  </svg>`;
}

function renderPage(idx) {
  const p = PAGES[idx];
  const container = document.getElementById('grid-container');
  container.innerHTML = '';

  p.cells.forEach(cell => {
    if (cell.type === 'text') {
      const d = document.createElement('div');
      d.className = 'text-cell';
      d.innerHTML = `<p class="text-series">${cell.label}</p><p class="text-body">${cell.body}</p>`;
      container.appendChild(d);
      return;
    }

    const d = document.createElement('div');
    d.className = 'cell';

    if (cell.src && cell.type === 'img') {
      d.innerHTML = `<img src="${cell.src}" loading="lazy">`;
    } else if (cell.src && cell.type === 'video') {
      d.innerHTML = `<video src="${cell.src}" autoplay muted loop playsinline></video>
                     <span class="vid-tag">▶ video</span>`;
    } else {
      d.innerHTML = `<div class="placeholder-x">${xSVG()}</div>`;
      if (cell.type === 'video') d.innerHTML += `<span class="vid-tag">▶ video</span>`;
    }

    container.appendChild(d);
  });

  const pad = n => String(n).padStart(2, '0');
  document.getElementById('page-label').textContent = `${pad(idx+1)} / ${pad(PAGES.length)}`;
  document.getElementById('prev-btn').disabled = idx === 0;
  document.getElementById('next-btn').disabled = idx === PAGES.length - 1;

  const dotsRow = document.getElementById('dots-row');
  dotsRow.innerHTML = '';
  PAGES.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === idx ? ' active' : '');
    dot.onclick = () => {
      current = i;
      renderPage(i);
    };
    dotsRow.appendChild(dot);
  });
}

/* ✅ Scroll from home to catalog */
function openCatalog() {
  document.getElementById('catalog').scrollIntoView({
    behavior: 'smooth'
  });
}

/* ✅ Keep position stable when changing page */
function changePage(dir) {
  current = Math.max(0, Math.min(PAGES.length - 1, current + dir));
  renderPage(current);
}

/* init */
renderPage(0);

</script>
</body>
</html>
